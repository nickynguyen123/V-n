  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Be Vietnam Pro', 'Segoe UI', sans-serif; background: #0d0d1a; color: #ddd8ee; min-height: 100vh; }
    .tabs-scroll { display: flex; gap: 7px; overflow-x: auto; padding: 14px 0 0; }

    .tab-btn { padding: 7px 13px; border-radius: 99px; cursor: pointer; font-size: 12px; font-weight: 600; white-space: nowrap; transition: all 0.2s; display: flex; align-items: center; gap: 6px; font-family: 'Be Vietnam Pro', sans-serif; }
    .item-row { cursor: pointer; transition: background 0.12s; }
    .item-row:hover { background: rgba(255,255,255,0.04); }
    .section-box { margin-bottom: 14px; background: rgba(255,255,255,0.03); border: 1px solid #1e1e40; border-radius: 12px; overflow: hidden; }
    .section-header { padding: 11px 16px; border-bottom: 1px solid #1e1e40; background: rgba(255,255,255,0.02); display: flex; justify-content: space-between; align-items: center; }
    .item-inner { padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .item-body { padding: 0 16px 14px 16px; }
    .def-box { font-size: 13px; line-height: 1.7; color: #9090b8; padding: 10px 14px; background: rgba(255,255,255,0.03); border-radius: 8px; margin-bottom: 10px; }
    .note-label { font-size: 11px; font-weight: 600; color: #46467a; margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
    .note-textarea { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid #2a2a55; border-radius: 8px; padding: 9px 12px; color: #ddd8ee; font-size: 13px; font-family: 'Be Vietnam Pro', sans-serif; resize: vertical; min-height: 72px; outline: none; line-height: 1.6; transition: border 0.2s; }
    .note-textarea:focus { border-color: #a78bfa; }
    .note-textarea::placeholder { color: #30305a; }
    .note-saved { font-size: 11px; color: #4ade80; margin-top: 5px; opacity: 0; transition: opacity 0.3s; }
    .note-saved.show { opacity: 1; }
    .item-divider { border-bottom: 1px solid #191932; }
    input[type=text] { font-family: 'Be Vietnam Pro', sans-serif; }
    input[type=text]::placeholder { color: #404060; }
    .search-box { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid #1e1e40; border-radius: 8px; padding: 9px 14px; color: #ddd8ee; font-size: 13px; outline: none; margin: 12px 0 14px; transition: border 0.2s; }
    .search-box:focus { border-color: #a78bfa; }
    .badge { border-radius: 99px; padding: 1px 7px; font-size: 10px; font-weight: 700; }
    .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; transition: background 0.2s; }
    .arrow { font-size: 12px; color: #34345a; transition: transform 0.25s; flex-shrink: 0; display: inline-block; }
    .arrow.open { transform: rotate(180deg); }
    .has-note-dot { width: 5px; height: 5px; border-radius: 50%; background: #fbbf24; flex-shrink: 0; margin-left: 2px; }
    .empty { text-align: center; color: #28284a; padding: 44px; font-size: 13px; }
    .notes-count { font-size: 11px; color: #fbbf24; font-weight: 600; }
  </style>
</head>

      {
        title: "Đặc thù đề thi 2026",
        items: [
          { term: "Ngữ liệu ngoài SGK", def: "Đề cho văn bản lạ hoàn toàn → cần kỹ năng đọc, không cần thuộc lòng tác phẩm" },
          { term: "Dạng đề 1", def: "Đọc hiểu văn bản VĂN HỌC → Viết đoạn nghị luận văn học + Bài nghị luận xã hội" },
          { term: "Dạng đề 2", def: "Đọc hiểu văn bản THÔNG TIN/NGHỊ LUẬN → Viết đoạn nghị luận xã hội + Bài nghị luận văn học" },
          { term: "Câu 5 đọc hiểu", def: "Câu vận dụng – phải có ý kiến cá nhân, viết 3–5 câu, liên hệ thực tế" },
          { term: "Tỉ lệ tư duy 4:3:3", def: "40% nhận biết – 30% thông hiểu – 30% vận dụng. Câu sau luôn khó hơn câu trước" },
        ]
      },
    ]
  },
];

// ── State ──────────────────────────────────────────────
let activeTab = "tiengviet";
let searchVal = "";
let expanded = {};
// notes: { [key]: string } — saved in localStorage
let notes = JSON.parse(localStorage.getItem("vhNotes2026") || "{}");

function saveNote(key, val) {
  notes[key] = val;
  localStorage.setItem("vhNotes2026", JSON.stringify(notes));
}

function totalItems() {
  return data.reduce((a, d) => a + d.sections.reduce((b, s) => b + s.items.length, 0), 0);
}

function totalNotes() {
  return Object.values(notes).filter(v => v && v.trim()).length;
}

// ── Render ─────────────────────────────────────────────
function render() {
  const activeData = data.find(d => d.id === activeTab);
  const filteredSections = searchVal.trim()
    ? activeData.sections.map(s => ({
        ...s,
        items: s.items.filter(i =>
          i.term.toLowerCase().includes(searchVal.toLowerCase()) ||
          i.def.toLowerCase().includes(searchVal.toLowerCase()) ||
          (notes[`${activeData.id}__${s.title}__${s.items.indexOf(i)}`] || "").toLowerCase().includes(searchVal.toLowerCase())
        )
      })).filter(s => s.items.length > 0)
    : activeData.sections;

  // tabs
  let tabsHTML = data.map(d => {
    const count = d.sections.reduce((a, s) => a + s.items.length, 0);
    const isActive = activeTab === d.id;
    return `
      <button class="tab-btn" onclick="setTab('${d.id}')"
        style="border:2px solid ${isActive ? d.color : '#1e1e40'};background:${isActive ? d.color + '1a' : 'transparent'};color:${isActive ? d.color : '#46467a'}">
        ${d.icon} ${d.label}
        <span class="badge" style="background:${isActive ? d.color : '#1e1e40'};color:${isActive ? '#111' : '#46467a'}">${count}</span>
      </button>`;
  }).join('');

  // sections
  let sectionsHTML = "";
  if (filteredSections.length === 0) {
    sectionsHTML = `<div class="empty">Không tìm thấy kết quả nào</div>`;
  } else {
    filteredSections.forEach(section => {
      let itemsHTML = "";
      section.items.forEach((item, i) => {
        const realIdx = activeData.sections.find(s => s.title === section.title)?.items.indexOf(item) ?? i;
        const key = `${activeData.id}__${section.title}__${realIdx}`;
        const isOpen = !!expanded[key];
        const noteVal = notes[key] || "";
        const hasNote = noteVal.trim().length > 0;
        const isLast = i === section.items.length - 1;

        const safeNote = noteVal.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

        itemsHTML += `
          <div class="${isLast ? '' : 'item-divider'}">
            <div class="item-row item-inner" onclick="toggleItem('${key.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">
              <div style="display:flex;align-items:center;gap:9px;flex:1;min-width:0">
                <div class="dot" style="background:${isOpen ? activeData.color : '#30305a'}"></div>
                <span style="font-size:13px;font-weight:${isOpen?600:500};color:${isOpen ? activeData.color : '#c0b8e0'}">${item.term}</span>
                ${hasNote ? '<div class="has-note-dot" title="Có ghi chú"></div>' : ''}
              </div>
              <span class="arrow ${isOpen ? 'open' : ''}">▾</span>
            </div>
            ${isOpen ? `
            <div class="item-body" onclick="event.stopPropagation()">
              <div class="def-box">${item.def}</div>
              <div class="note-label">📝 Ghi chú của bạn</div>
              <textarea class="note-textarea"
                id="note-${key.replace(/[^a-zA-Z0-9]/g,'-')}"
                placeholder="Ghi ví dụ, cách nhớ, liên hệ thực tế..."
                onchange="saveNoteUI('${key.replace(/'/g,"\\'")}', this.value)"
              >${safeNote}</textarea>
              <div class="note-saved" id="saved-${key.replace(/[^a-zA-Z0-9]/g,'-')}">✓ Đã lưu</div>
            </div>` : ''}
          </div>`;
      });

      sectionsHTML += `
        <div class="section-box">
          <div class="section-header">
            <span style="font-size:12px;font-weight:700;color:${activeData.color}">${section.title}</span>
            <span style="font-size:11px;color:#34345a">${section.items.length} mục</span>
          </div>
          ${itemsHTML}
        </div>`;
    });
  }

  const tn = totalNotes();

  document.getElementById('app').innerHTML = `
    <div>
      <div style="background:linear-gradient(135deg,#111128,#181838,#0e2040);padding:26px 22px 18px;border-bottom:1px solid #1e1e40">
        <div style="max-width:800px;margin:0 auto">
          <p style="font-size:10px;color:#a78bfa;letter-spacing:4px;text-transform:uppercase;margin-bottom:5px">Thi THPT 2026 · Chương trình mới</p>
          <h1 style="font-size:22px;font-weight:700;color:#f0eaff;margin-bottom:3px">Hệ thống Kiến thức Ngữ Văn</h1>
          <div style="display:flex;align-items:center;gap:14px;margin-top:4px">
            <p style="color:#46467a;font-size:12px">${totalItems()} đơn vị kiến thức</p>
            ${tn > 0 ? `<span class="notes-count">📝 ${tn} ghi chú</span>` : ''}
          </div>
        </div>
      </div>

      <div style="max-width:800px;margin:0 auto;padding:0 18px">
        <div class="tabs-scroll">${tabsHTML}</div>
        <input class="search-box" type="text" placeholder='Tìm kiến thức hoặc trong ghi chú...'
          value="${searchVal.replace(/"/g,'&quot;')}"
          oninput="setSearch(this.value)" />
        <div style="padding-bottom:52px">${sectionsHTML}</div>
      </div>
    </div>`;
}

function setTab(id) { activeTab = id; searchVal = ""; render(); }
function setSearch(val) { searchVal = val; render(); }
function toggleItem(key) { expanded[key] = !expanded[key]; render(); }

function saveNoteUI(key, val) {
  saveNote(key, val);
  const safeId = key.replace(/[^a-zA-Z0-9]/g, '-');
  const el = document.getElementById('saved-' + safeId);
  if (el) {
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 1500);
  }
}

render();
</script>
</body>
</html>
